<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的小工具</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Noto Sans TC', sans-serif; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

  <!-- Header -->
  <header class="bg-gradient-to-br from-indigo-900 via-slate-900 to-slate-950 border-b border-white/10">
    <div class="max-w-4xl mx-auto px-6 py-10 text-center">
      <h1 class="text-3xl sm:text-4xl font-black tracking-tight">我的小工具</h1>
      <p class="text-slate-400 text-sm mt-2">選擇想前往的頁面</p>
    </div>
  </header>

  <!-- Card Grid -->
  <main class="max-w-4xl mx-auto px-6 py-12">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

      <!-- Card 1: Autumn Road Trip -->
      <a href="trip.html"
        class="nav-card bg-white/5 border border-white/10 rounded-2xl p-6 flex flex-col gap-3 transition active:scale-95 no-underline hover:border-white/20">
        <div class="text-4xl">🍁</div>
        <div>
          <h2 class="text-lg font-bold text-slate-100">Autumn Road Trip</h2>
          <p class="text-sm text-slate-400 mt-1">東京→熱海→河口湖 秋季紅葉巡航・8日行程</p>
        </div>
        <div class="mt-auto text-indigo-400 text-sm font-medium">前往 →</div>
      </a>

      <!-- Card 2: Sports Betting Tracker -->
      <a href="betting.html"
        class="nav-card bg-white/5 border border-white/10 rounded-2xl p-6 flex flex-col gap-3 transition active:scale-95 no-underline hover:border-white/20">
        <div class="text-4xl">🏆</div>
        <div>
          <h2 class="text-lg font-bold text-slate-100">運彩投注紀錄</h2>
          <p class="text-sm text-slate-400 mt-1">世界盃複式串關・盈虧自動計算</p>
        </div>
        <div class="mt-auto text-indigo-400 text-sm font-medium">前往 →</div>
      </a>

      <!-- Card 3: Yacht Dice -->
      <a href="yacht.html"
        class="nav-card bg-white/5 border border-white/10 rounded-2xl p-6 flex flex-col gap-3 transition active:scale-95 no-underline hover:border-white/20">
        <div class="text-4xl">🎲</div>
        <div>
          <h2 class="text-lg font-bold text-slate-100">快艇骰子</h2>
          <p class="text-sm text-slate-400 mt-1">5顆骰子・13類別・支援雙人與 CPU 對戰</p>
        </div>
        <div class="mt-auto text-indigo-400 text-sm font-medium">前往 →</div>
      </a>

    </div>
  </main>

  <script>
  // Entrance animation + hover — respects prefers-reduced-motion
  // Uses window.matchMedia directly to avoid gsap.matchMedia object-form
  // firing the callback once per matching condition (which caused duplicate
  // stagger tweens and the broken mid-animation state).
  (function () {
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const canHover      = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

    if (reducedMotion) return; // cards already visible; no animation needed

    // Pre-hide cards synchronously to avoid a flash before animating
    gsap.set('.nav-card', { autoAlpha: 0, y: 32 });

    // Stagger entrance — explicit to/from states, no CSS-read ambiguity
    gsap.to('.nav-card', {
      autoAlpha: 1,
      y: 0,
      stagger: 0.12,
      duration: 0.5,
      ease: 'power2.out',
    });

    // Hover lift (pointer devices only)
    if (canHover) {
      document.querySelectorAll('.nav-card').forEach(card => {
        card.addEventListener('mouseenter', () => gsap.to(card, {
          y: -6, scale: 1.03,
          boxShadow: '0 16px 40px rgba(79,70,229,0.30)',
          duration: 0.25, overwrite: 'auto',
        }));
        card.addEventListener('mouseleave', () => gsap.to(card, {
          y: 0, scale: 1,
          boxShadow: '0 0px 0px rgba(0,0,0,0)',
          duration: 0.25, overwrite: 'auto',
        }));
      });
    }
  }());
  </script>

</body>
</html>
